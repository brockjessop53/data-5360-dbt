version: 2

models:

  - name: dim_customer
    description: 'Dimension table containing customer-level information sourced from the transactional system.
      Represents unique customers and is used to link customer-related activity across fact tables.'
    columns:
      - name: customer_key
        tests:
          - unique

  - name: dim_product
    description: 'Dimension table containing product-level attributes.
      Provides descriptive information for products referenced in order line transactions.'
    columns:
      - name: product_name
        tests:
          - not_null

  - name: dim_promotional_campaign
    description: 'Dimension table describing promotional campaigns.
      Used to analyze the impact of marketing campaigns across orders and interactions.'
    columns:
      - name: campaign_key
        tests: 
          - unique
  
  - name: dim_date
    description: 'Standard date dimension table used to support time-based analysis.
      Enables consistent aggregation and filtering by calendar dates across fact tables.'
    columns:
      - name: date_key
        tests:
          - unique

  - name: dim_timestamp
    description: 'Dimension table representing timestamp-level granularity derived from event data.
      Supports detailed time-based analysis including hour, minute, and second breakdowns.'
    columns:
      - name: timestamp_key
        tests:
          - unique

  - name: dim_email
    description: 'Dimension table containing unique email identifiers.
      Used to track and analyze email-related activity in marketing event data.'
    columns:
      - name: email_key
        tests:
          - not_null

  - name: dim_event
    description: 'Dimension table representing types of marketing events such as sent, open, and click.
      Provides categorical context for email marketing interactions.'
    columns:
      - name: eventtype
        tests:
          - accepted_values:
              values: ['SENT', 'CLICK', 'OPEN']
  - name: fact_email_marketing_events
    description: 'Fact table capturing email marketing activity at the event level.
      Each row represents a marketing event (e.g., sent, open, click) and links to relevant dimensions
      such as customer, campaign, timestamp, and event type.'
    columns:
      - name: customer_key
        tests:
          - relationships:
                to: ref('dim_customer')
                field: customer_key
  - name: fact_order_line
    description: 'Fact table representing individual order line transactions.
      Each row corresponds to a product within an order and includes pricing, quantity,
      discount, and associated dimensional context such as customer, product, campaign, and date.'
    columns:
      - name: customer_key
        tests:
          - relationships:
                to: ref('dim_customer')
                field: customer_key